# =============================================================
# ESPLUS ERP V3 — Application Configuration
# =============================================================

spring:
  application:
    name: esplus-erp

  # === PostgreSQL ===
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mgmt_v2?stringtype=unspecified}
    username: ${DB_USERNAME:aaron}
    password: ${DB_PASSWORD:caonima123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # === JPA ===
  jpa:
    hibernate:
      ddl-auto: none  # Flyway manages schema
      naming:
        # Mixed naming (snake_case + camelCase columns),
        # so we use identity strategy and specify exact names in @Column
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    open-in-view: false   # Prevent lazy-loading issues
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
        default_batch_fetch_size: 100   # N+1 safety net (v3-architecture §9)
        order_inserts: true             # Group INSERTs by entity type for batching
        order_updates: true             # Group UPDATEs by entity type for batching
        jdbc:
          batch_size: 50                # Batch N statements per roundtrip (v3-architecture §9)
          time_zone: America/Los_Angeles  # Pacific Time

  # === Flyway ===
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"
    validate-on-migrate: true

  # === Redis ===
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # === Mail (Gmail SMTP) ===
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # === Jackson ===
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Los_Angeles

  # === Task Scheduling ===
  task:
    scheduling:
      pool:
        size: 3  # Allow daily sync + ad rate refresh + auto-promote to run concurrently

# === Server ===
server:
  port: 8080
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

# === Actuator ===
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

# === JWT ===
mgmt:
  jwt:
    secret: ${JWT_SECRET:EsplusErpV3SuperSecretKeyForJwtSigning2026!@#$%^&*()}
    access-token-expiry: 3600    # 1 hour (seconds)
    refresh-token-expiry: 604800 # 7 days (seconds)
    issuer: esplus-erp
  security:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://192.168.1.162:3000,https://erp.topmorrowusa.com}

# === OpenAPI ===
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method

# === Logging ===
logging:
  level:
    root: INFO
    com.mgmt: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# === App Custom Config ===
app:
  project-root: ${MGMT_PROJECT_ROOT:}
  output-dir: ${REPORT_OUTPUT_DIR:output}
  # Sales data source: 'api' = ebay_api.cleaned_transactions, 'csv' = public.cleaned_transactions (fallback)
  sales-data-source: ${SALES_DATA_SOURCE:api}

# === eBay OAuth ===
ebay:
  oauth:
    client-id: ${EBAY_CLIENT_ID:}
    client-secret: ${EBAY_CLIENT_SECRET:}
    ru-name: ${EBAY_RU_NAME:Aaron_Tong-AaronTon-ERP-PR-tspuspknv}
    # eBay redirects here after user authorizes; frontend handles the code
    redirect-uri: ${EBAY_REDIRECT_URI:https://erp.topmorrowusa.com/ebay/callback/}
  webhook:
    # eBay Developer Portal 中生成的 verification token
    verification-token: ${EBAY_WEBHOOK_VERIFICATION_TOKEN:}
    # 公网 Webhook 接收端点 URL (context-path /api/v1 已包含在内)
    endpoint-url: ${EBAY_WEBHOOK_ENDPOINT_URL:https://api.topmorrowusa.com/api/v1/ebay/webhook}
    # 是否启用事件处理 (false = 仅响应 challenge + 签名验证, 不触发业务逻辑)
    enabled: ${EBAY_WEBHOOK_ENABLED:false}
